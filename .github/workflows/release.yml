name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Rust tests and Vitest
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run Vitest
        run: bunx vitest run

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --locked

  build:
    name: Build and attach release assets
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: "--bundles deb,rpm"
            rust_targets: ""
          - platform: windows-latest
            args: ""
            rust_targets: ""
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Orkestra OS ${{ github.ref_name }}"
          releaseBody: "Automated release for ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      - name: Upload Linux packages for Cloudsmith publish job
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  publish-cloudsmith:
    name: Publish Linux packages to Cloudsmith
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      CLOUDSMITH_STABLE_REPO: fetchupstream/orkestra-os
      CLOUDSMITH_UNSTABLE_REPO: fetchupstream/orkestra-os-unstable

    steps:
      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist

      - name: Authenticate and install Cloudsmith CLI
        uses: cloudsmith-io/cloudsmith-cli-action@v2
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Choose stable or unstable repo from tag
        id: cloudsmith-target
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ "$TAG" == *-* ]]; then
            echo "repo=${CLOUDSMITH_UNSTABLE_REPO}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${CLOUDSMITH_STABLE_REPO}" >> "$GITHUB_OUTPUT"
          fi

      - name: Push Debian packages to Cloudsmith
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=(dist/**/*.deb dist/*.deb)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No .deb files found"
            exit 1
          fi

          for f in "${files[@]}"; do
            echo "Uploading $f"
            cloudsmith push deb "${{ steps.cloudsmith-target.outputs.repo }}/ubuntu/any-version" "$f"
          done

      - name: Push RPM packages to Cloudsmith
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=(dist/**/*.rpm dist/*.rpm)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No .rpm files found"
            exit 1
          fi

          for f in "${files[@]}"; do
            echo "Uploading $f"
            cloudsmith push rpm "${{ steps.cloudsmith-target.outputs.repo }}/fedora/any-version" "$f"
          done
